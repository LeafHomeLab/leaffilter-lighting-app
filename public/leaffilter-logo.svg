<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 90" fill="none">
  <defs>
    <!-- Soft ambient glow behind the light bar -->
    <filter id="ambient" x="-30%" y="-200%" width="160%" height="600%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft-glow" x="-20%" y="-100%" width="140%" height="300%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <!-- Light bar gradient — bright center fading to edges -->
    <linearGradient id="bar-fill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E676" stop-opacity="0"/>
      <stop offset="8%" stop-color="#00E676" stop-opacity="0.6"/>
      <stop offset="20%" stop-color="#00E676" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="80%" stop-color="#00E676" stop-opacity="0.9"/>
      <stop offset="92%" stop-color="#00E676" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00E676" stop-opacity="0"/>
    </linearGradient>
    <!-- Glow halo beneath the bar -->
    <linearGradient id="glow-fill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E676" stop-opacity="0"/>
      <stop offset="15%" stop-color="#00E676" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#69F0AE" stop-opacity="0.5"/>
      <stop offset="85%" stop-color="#00E676" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00E676" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- "LIGHTING BY" subtitle -->
  <text x="140" y="24" text-anchor="middle" fill="#8E8E93" font-family="'Founders Grotesk', 'Space Grotesk', system-ui, sans-serif" font-size="11" font-weight="400" letter-spacing="3.5">LIGHTING BY</text>

  <!-- "LeafFilter" wordmark -->
  <text x="140" y="54" text-anchor="middle" fill="white" font-family="'Founders Grotesk', 'Space Grotesk', system-ui, sans-serif" font-size="32" font-weight="600" letter-spacing="-0.3">LeafFilter</text>
  
  <!-- ® symbol -->
  <text x="232" y="37" fill="#8E8E93" font-family="'Founders Grotesk', 'Space Grotesk', system-ui, sans-serif" font-size="8" font-weight="400">®</text>

  <!-- Soft glow halo beneath the bar (the "light shining down" effect) -->
  <ellipse cx="140" cy="70" rx="110" ry="12" fill="url(#glow-fill)" filter="url(#soft-glow)" opacity="0.7">
    <animate attributeName="opacity" values="0.5;0.8;0.5" dur="3s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Main light bar — thin bright strip -->
  <rect x="30" y="68" width="220" height="2" rx="1" fill="url(#bar-fill)" filter="url(#ambient)">
    <animate attributeName="opacity" values="0.85;1;0.85" dur="2.5s" repeatCount="indefinite"/>
  </rect>

  <!-- Secondary bright core for extra punch -->
  <rect x="60" y="68.5" width="160" height="1" rx="0.5" fill="white" opacity="0.4">
    <animate attributeName="opacity" values="0.3;0.5;0.3" dur="2s" repeatCount="indefinite"/>
  </rect>
</svg>
